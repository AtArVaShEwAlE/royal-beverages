<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Royal Beverages</title>
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #e1e8ed;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        .login-header {
            text-align: center;
            padding: 48px 40px 32px 40px;
            border-bottom: 1px solid #e1e8ed;
        }

        .login-header img {
            height: 48px;
            margin-bottom: 20px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .login-header p {
            font-size: 13px;
            color: #7f8c8d;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .login-body {
            padding: 32px 40px;
        }

        /* Flash Messages */
        .alert {
            padding: 14px 16px;
            margin-bottom: 24px;
            border-left: 3px solid;
            font-size: 14px;
            border-radius: 0;
        }

        .alert-danger {
            background: #fff5f5;
            border-color: #e74c3c;
            color: #721c24;
        }

        .alert-success {
            background: #f0fdf4;
            border-color: #27ae60;
            color: #155724;
        }

        .alert-info {
            background: #eff6ff;
            border-color: #3498db;
            color: #0c5460;
        }

        .alert-warning {
            background: #fffbeb;
            border-color: #f39c12;
            color: #856404;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: 600;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid #e1e8ed;
            background: #ffffff;
            transition: all 0.2s;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 3px rgba(26,26,26,0.05);
        }

        /* Remember Me */
        .remember-me-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 24px 0;
            padding: 14px;
            background: #f8f9fa;
            cursor: pointer;
            transition: background 0.2s;
        }

        .remember-me-group:hover {
            background: #f0f1f3;
        }

        .remember-me-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1a1a1a;
        }

        .remember-me-group label {
            margin: 0;
            cursor: pointer;
            font-size: 13px;
            color: #2c3e50;
            font-weight: 500;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            background: #000000;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        /* Divider */
        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e1e8ed;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #7f8c8d;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Signup Link */
        .signup-link {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e1e8ed;
        }

        .signup-link p {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #7f8c8d;
        }

        .signup-link a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }

        .signup-link a:hover {
            color: #27ae60;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .login-header {
                padding: 32px 24px 24px 24px;
            }

            .login-body {
                padding: 24px;
            }

            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <img src="{{ url_for('static', filename='images/RBLOGO.png') }}" alt="Royal Beverages">
            <h1>Welcome Back</h1>
            <p>Supply & Distribution Management</p>
        </div>

        <!-- Body -->
        <div class="login-body">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required autofocus placeholder="Enter username">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter password">
                </div>

                <!-- Remember Me -->
                <div class="remember-me-group">
                    <input type="checkbox" id="remember" name="remember" value="1">
                    <label for="remember">Keep me signed in for 30 days</label>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Signup Link -->
            <div class="signup-link">
                <p>New to Royal Beverages?</p>
                <a href="{{ url_for('signup') }}">Create Account →</a>
            </div>
        </div>
    </div>

</body>
</html>
